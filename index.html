  to {
    opacity: 1;
    backdrop-filter: blur(8px);
  }
}

.hidden {
  display: none !important;

    'apikey': SUPABASE_KEY
  };

  try {
    let url = `${SUPABASE_URL}/rest/v1/${table}`;
    let options = { headers, method };

    if (method === 'GET') {
      const response = await fetch(url, options);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const text = await response.text();
      return { ok: true, data: text ? JSON.parse(text) : [] };
    } else if (method === 'POST') {
      options.body = JSON.stringify(data);
      const response = await fetch(url, options);
      if (!response.ok) {
        const errText = await response.text();
        console.error('Supabase error response:', errText);
        throw new Error(`HTTP ${response.status}: ${errText}`);
      }
      const text = await response.text();
      return { ok: true, data: text ? JSON.parse(text) : [] };
    } else if (method === 'PATCH') {
      url += `?id=eq.${data.id}`;
      const { id, ...updateData } = data;
      options.body = JSON.stringify(updateData);
      const response = await fetch(url, options);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const text = await response.text();
      return { ok: true, data: text ? JSON.parse(text) : [] };
    } else if (method === 'DELETE') {
      url += `?id=eq.${data.id}`;
      const response = await fetch(url, options);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      return { ok: true, data: null };
    }
  } catch (err) {
    console.error(`Supabase ${method} error:`, err);
    return { ok: false, error: err.message };
  }
}

function navigateTo(page, data) {
  // Fade out current pages
  document.querySelectorAll('.page').forEach(p => { 
    if (!p.classList.contains('hidden')) {
      p.style.opacity = '0';
      p.style.transition = 'opacity 0.2s ease-out, transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1)';
      p.style.transform = 'translateY(-15px)';
    }
  });

  // Wait for fade out, then switch pages
  setTimeout(() => {
    document.querySelectorAll('.page').forEach(p => { p.classList.add('hidden'); p.innerHTML = ''; });
    currentPage = page;
    const el = document.getElementById('page-' + page);
    if (el) { 
      el.classList.remove('hidden');
      el.style.opacity = '0';
      el.style.transform = 'translateY(15px)';
      el.style.transition = 'opacity 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)';
      // Trigger reflow to start animation
      el.offsetHeight;
      el.style.opacity = '1';
      el.style.transform = 'translateY(0)';
    }
    window.scrollTo(0, 0);
    document.getElementById('app').scrollTop = 0;

    switch(page) {
      case 'home': renderHome(); break;
      case 'shop': renderShop(); break;
      case 'product': currentProduct = data; renderProduct(); break;
      case 'checkout': renderCheckout(); break;
      case 'special': renderSpecial(); break;
      case 'admin': renderAdmin(); break;
      case 'order-success': renderOrderSuccess(); break;
    }
    lucide.createIcons();
  }, 200);
}

// ========== CART ==========
function addToCart(slug) {
  const product = PRODUCTS.find(p => p.slug === slug);
  if (!product) return;
  const existing = cart.find(c => c.slug === slug);
  if (existing) { existing.qty++; } else { cart.push({ ...product, qty: 1 }); }
  updateCartUI();
  document.getElementById('cartModal').classList.remove('hidden');
}

function removeFromCart(slug) {
  cart = cart.filter(c => c.slug !== slug);
  updateCartUI();
  renderCartItems();
}

function updateCartQty(slug, delta) {
  const item = cart.find(c => c.slug === slug);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) { cart = cart.filter(c => c.slug !== slug); }
  updateCartUI();
  renderCartItems();
}

function updateCartUI() {
  const badge = document.getElementById('cartBadge');
  const total = cart.reduce((s, c) => s + c.qty, 0);
  if (total > 0) { badge.classList.remove('hidden'); badge.textContent = total; }
  else { badge.classList.add('hidden'); }
  renderCartItems();
}

function handleZoom(e, el) {
  const rect = el.getBoundingClientRect();
  const x = ((e.clientX - rect.left) / rect.width - 0.5) * 20;
  const y = ((e.clientY - rect.top) / rect.height - 0.5) * 20;
  const emoji = el.querySelector('span');
  if (emoji) emoji.style.transform = `scale(1.2) translate(${-x}px, ${-y}px)`;
}
function resetZoom(el) {
  const emoji = el.querySelector('span');

async function submitOrder(e) {
  e.preventDefault();
  const name = document.getElementById('co_name').value.trim();
  const phone = document.getElementById('co_phone').value.trim();
  const city = document.getElementById('co_city').value;
  const address = document.getElementById('co_address').value.trim();
  const errEl = document.getElementById('checkoutError');
  const btn = document.getElementById('checkoutBtn');

  if (!name || !phone || !city || !address) {
    errEl.textContent = 'Please fill all fields'; errEl.classList.remove('hidden'); return;
  }
  if (!/^01[0-9]{9}$/.test(phone)) {
    errEl.textContent = 'Invalid Egyptian phone number'; errEl.classList.remove('hidden'); return;
  }

  btn.disabled = true;
  btn.textContent = 'PROCESSING...';
  errEl.classList.add('hidden');

  const total = cart.reduce((s, c) => s + c.price * c.qty, 0);
  const itemsStr = cart.map(c => `${c.title}x${c.qty}`).join(', ');

  const result = await supabaseCall('orders', 'POST', {
    customer_name: name,
    phone: phone,
    address: `${city} - ${address}`,
    items: itemsStr,
    total: total,
    status: 'pending',
    created_at: new Date().toISOString()
  });

  if (result.ok) {
    cart = [];
    updateCartUI();
    navigateTo('order-success');
  } else {
    errEl.textContent = result.error || 'Something went wrong. Please try again.';
    errEl.classList.remove('hidden');
    btn.disabled = false;
    btn.textContent = 'CONFIRM ORDER – COD 💰';
  }
}

async function submitDesignRequest(e) {
  e.preventDefault();
  const name = document.getElementById('sp_name').value.trim();
  const phone = document.getElementById('sp_phone').value.trim();
  const desc = document.getElementById('sp_desc').value.trim();
  const errEl = document.getElementById('specialError');
  const succEl = document.getElementById('specialSuccess');
  const btn = document.getElementById('specialBtn');

  errEl.classList.add('hidden');
  succEl.classList.add('hidden');

  if (!name || !phone || !desc) {
    errEl.textContent = 'Please fill all fields'; errEl.classList.remove('hidden'); return;
  }

  btn.disabled = true; btn.textContent = 'SENDING...';

  const result = await supabaseCall('design_requests', 'POST', {
    design_name: name,
    design_phone: phone,
    design_request: desc,
    status: 'new',
    created_at: new Date().toISOString()
  });

  if (result.ok) {
    succEl.textContent = '✅ Request sent! We\'ll contact you soon.';
    succEl.classList.remove('hidden');
    document.getElementById('sp_name').value = '';
    document.getElementById('sp_phone').value = '';
    document.getElementById('sp_desc').value = '';
  } else {
    errEl.textContent = 'Failed to send. Please try again.';
    errEl.classList.remove('hidden');

  btn.disabled = false; btn.textContent = 'SEND REQUEST ✨';
}

              <input id="coverUrl" type="url" placeholder="https://example.com/image.jpg" class="w-full bg-dark-700 border border-gray-800 rounded-xl px-4 py-3 text-white placeholder-gray-600 font-handwrite">

              <button type="button" onclick="closeCoverEditModal()" class="flex-1 py-3 rounded-xl font-bebas text-lg text-white bg-gray-700 hover:bg-gray-600 transition" style="min-height: 45px; font-weight: bold; border: 2px solid rgba(255, 255, 255, 0.1);">CANCEL</button>
            </div>
          </form>
        </div>
      </div>

      <!-- ADD/EDIT POSTER MODAL -->
      <div id="posterModal" class="fixed inset-0 bg-black bg-opacity-80 z-50 hidden flex items-center justify-center p-4 overflow-auto">
        <div class="glass rounded-2xl p-6 max-w-2xl w-full my-auto slide-up">
          <div class="flex items-center justify-between mb-4">
            <h2 class="font-handwrite text-3xl" id="modalTitle" style="background: linear-gradient(90deg, #ff1a1a, #ff6b6b, #ff1a1a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-style: italic;">ADD NEW POSTER</h2>
            <button onclick="closeAddPosterModal()" class="p-2 hover:bg-gray-800 rounded-lg transition">

            </button>
          </div>

          <form onsubmit="savePoster(event)" class="space-y-4">
            <div>
              <label class="block text-sm text-gray-400 mb-2" for="posterCategory">Category *</label>
              <select id="posterCategory" required class="w-full bg-dark-700 border border-gray-800 rounded-xl px-4 py-3 text-white font-bebas">
                ${CATEGORIES.map(cat => `<option value="${cat.id}">${cat.emoji} ${cat.name}</option>`).join('')}

              <label class="block text-sm text-gray-400 mb-2" for="posterTitle">Poster Name *</label>
              <input id="posterTitle" type="text" required placeholder="E.g. Ferrari F40 Red" class="w-full bg-dark-700 border border-gray-800 rounded-xl px-4 py-3 text-white placeholder-gray-600 font-bebas text-base">
            </div>

            <div>
              <label class="block text-sm text-gray-400 mb-2" for="posterPrice">Price (EGP) *</label>
              <input id="posterPrice" type="number" required min="1" placeholder="149" class="w-full bg-dark-700 border border-gray-800 rounded-xl px-4 py-3 text-white placeholder-gray-600 font-bebas text-base">
            </div>

            <div>
              <label class="block text-sm text-gray-400 mb-2" for="posterEmoji">Emoji</label>
              <input id="posterEmoji" type="text" maxlength="2" placeholder="🏎️" value="🎨" class="w-full bg-dark-700 border border-gray-800 rounded-xl px-4 py-3 text-white placeholder-gray-600 font-bebas text-base">

            <div>
              <label class="block text-sm text-gray-400 mb-2" for="posterDesc">Description</label>
              <textarea id="posterDesc" rows="2" placeholder="Optional description..." class="w-full bg-dark-700 border border-gray-800 rounded-xl px-4 py-3 text-white placeholder-gray-600 resize-none font-bebas text-base"></textarea>

            <div>
              <label class="block text-sm text-gray-400 mb-2">Image</label>
              <div class="space-y-2">
                <div class="flex gap-2">
                  <input id="posterImage" type="url" placeholder="https://example.com/image.jpg" class="flex-1 bg-dark-700 border border-gray-800 rounded-xl px-4 py-3 text-white placeholder-gray-600 font-bebas text-base" />
                  <button type="button" onclick="document.getElementById('posterImageFile').click()" class="px-4 py-3 bg-dark-700 border border-gray-800 rounded-xl text-white font-bebas hover:bg-dark-600 transition">
                    أو رفع ملف
                  </button>

                <input id="posterImageFile" type="file" accept="image/*" class="hidden" onchange="handleImageUpload(this)" />

            <div id="posterError" class="text-red-400 text-sm hidden"></div>

              <button type="submit" class="flex-1 py-3 rounded-xl font-bebas text-lg text-white transition" style="background:#ff1a1a; min-height: 45px; font-weight: bold; box-shadow: 0 0 10px rgba(255, 26, 26, 0.3), 0 0 20px rgba(255, 26, 26, 0.15); border: 2px solid rgba(255, 26, 26, 0.2);">SAVE POSTER</button>
              <button type="button" onclick="closeAddPosterModal()" class="flex-1 py-3 rounded-xl font-bebas text-lg text-white bg-gray-700 hover:bg-gray-600 transition" style="min-height: 45px; font-weight: bold; border: 2px solid rgba(255, 255, 255, 0.1);">CANCEL</button>
            </div>

  showPosterCategory('cars');
  lucide.createIcons();

function tryAdminLogin(e) {
  e.preventDefault();
  const pass = document.getElementById('adminPass').value;
  if (pass === ADMIN_PASS) {
    adminUnlocked = true;
    renderAdmin();
  } else {
    const err = document.getElementById('adminError');
    err.textContent = 'Wrong password';
    err.classList.remove('hidden');
  }
}

async function saveCoverImage(e) {
  e.preventDefault();
  const imageUrl = document.getElementById('coverUrl').value.trim();
  const errEl = document.getElementById('coverError');
  
  if (!currentEditingCategoryId) {
    errEl.textContent = 'No category selected';
    errEl.classList.remove('hidden');
    return;
  }

  if (!imageUrl) {
    errEl.textContent = 'Please enter an image URL or upload a file';
    errEl.classList.remove('hidden');
    return;
  }

  // حفظ الصورة
  categoryCoverImages[currentEditingCategoryId] = imageUrl;
  saveCategoryCovers();
  
  closeCoverEditModal();
  renderAdmin();
}

function editCoverImage(catId) {
  currentEditingCategoryId = catId;
  const imageUrl = categoryCoverImages[catId] || '';
  document.getElementById('coverModalTitle').textContent = `EDIT ${CATEGORIES.find(c => c.id === catId)?.name} COVER`;
  document.getElementById('coverUrl').value = imageUrl;
  document.getElementById('coverError').classList.add('hidden');
  document.getElementById('coverEditModal').classList.remove('hidden');
}

function openAddPosterModal() {
  currentEditingPosterId = null;
  document.getElementById('modalTitle').textContent = 'ADD NEW POSTER';
  document.getElementById('posterCategory').value = 'cars';
  document.getElementById('posterTitle').value = '';
  document.getElementById('posterPrice').value = '';
  document.getElementById('posterEmoji').value = '🎨';
  document.getElementById('posterDesc').value = '';
  document.getElementById('posterImage').value = '';
  document.getElementById('posterError').classList.add('hidden');
  document.getElementById('posterModal').classList.remove('hidden');
  lucide.createIcons();
}

function closeAddPosterModal() {
  document.getElementById('posterModal').classList.add('hidden');
  currentEditingPosterId = null;
  document.getElementById('posterForm')?.reset();
}

function handleImageUpload(input) {
  const file = input.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = (e) => {
    const base64 = e.target.result;
    document.getElementById('posterImage').value = base64;
    document.getElementById('imagePreview').textContent = `✓ تم تحميل: ${file.name} (${(file.size / 1024).toFixed(2)} KB)`;
  };
  reader.readAsDataURL(file);
}

function handleCoverImageUpload(input) {
  const file = input.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = (e) => {
    const base64 = e.target.result;
    document.getElementById('coverUrl').value = base64;
    document.getElementById('coverUploadPreview').textContent = `✓ تم تحميل: ${file.name}`;
  };
  reader.readAsDataURL(file);
}

async function savePoster(e) {
  e.preventDefault();
  const category = document.getElementById('posterCategory').value;
  const title = document.getElementById('posterTitle').value.trim();
  const price = parseInt(document.getElementById('posterPrice').value);
  const emoji = document.getElementById('posterEmoji').value || '🎨';
  const desc = document.getElementById('posterDesc').value.trim();
  const imageUrl = document.getElementById('posterImage').value.trim();
  const errEl = document.getElementById('posterError');

  if (!title || !price) {
    errEl.textContent = 'الرجاء ملء اسم البوستر والسعر';
    errEl.classList.remove('hidden');
    return;
  }

  const submitBtn = e.target.querySelector('button[type="submit"]');
  submitBtn.disabled = true;
  submitBtn.textContent = 'SAVING...';

  try {
    const slug = title.toLowerCase().replace(/\s+/g, '-');
    
    const posterData = {
      slug: slug,
      title: title,
      category: category,
      price: price,
      emoji: emoji,
      desc: desc,
      image: imageUrl,
      gradient: 'from-gray-900 to-black'
    };

    let result;
    if (currentEditingPosterId) {
      // Update existing poster
      result = await supabaseCall('products', 'PATCH', { id: currentEditingPosterId, ...posterData });
    } else {
      // Create new poster
      console.log('Saving poster:', posterData);
      result = await supabaseCall('products', 'POST', posterData);
    }

    if (result.ok) {
      await loadProductsFromSupabase();
      closeAddPosterModal();
      renderAdmin();
    } else {
      errEl.textContent = 'فشل حفظ البوستر. حاول مرة أخرى.';
      errEl.classList.remove('hidden');
      submitBtn.disabled = false;
      submitBtn.textContent = 'SAVE POSTER';
    }
  } catch (err) {
    console.error('Error saving poster:', err);
    errEl.textContent = 'حدث خطأ: ' + err.message;
    errEl.classList.remove('hidden');
    submitBtn.disabled = false;
    submitBtn.textContent = 'SAVE POSTER';
  }
}

function editPoster(backendId) {
  console.log('Edit poster clicked with ID:', backendId);
  const poster = PRODUCTS.find(p => String(p.id) === String(backendId) || String(p.slug) === String(backendId));
  if (!poster) {
    console.error('Poster not found with ID:', backendId);
    return;
  }

  currentEditingPosterId = backendId;
  
  const modalTitle = document.getElementById('modalTitle');
  const posterCategory = document.getElementById('posterCategory');
  const posterTitle = document.getElementById('posterTitle');
  const posterPrice = document.getElementById('posterPrice');
  const posterEmoji = document.getElementById('posterEmoji');
  const posterDesc = document.getElementById('posterDesc');
  const posterImage = document.getElementById('posterImage');
  const posterModal = document.getElementById('posterModal');
  
  if (modalTitle) modalTitle.textContent = 'تعديل البوستر';
  if (posterCategory) posterCategory.value = poster.category || 'cars';
  if (posterTitle) posterTitle.value = poster.title || '';
  if (posterPrice) posterPrice.value = poster.price || '';
  if (posterEmoji) posterEmoji.value = poster.emoji || '🎨';
  if (posterDesc) posterDesc.value = poster.desc || '';
  if (posterImage) posterImage.value = poster.image || '';
  
  const imagePreview = document.getElementById('imagePreview');
  if (imagePreview && poster.image) {
    imagePreview.textContent = '✓ صورة موجودة: ' + poster.image.substring(0, 50);
  }
  
  const posterError = document.getElementById('posterError');
  if (posterError) posterError.classList.add('hidden');
  
  if (posterModal) {
    posterModal.classList.remove('hidden');
    console.log('Modal opened successfully');
  }
  
  if (typeof lucide !== 'undefined') {
    lucide.createIcons();
  }
}

async function deletePoster(backendId) {
  // عرض modal تأكيد احترافي
  const confirmModal = document.createElement('div');
  confirmModal.id = 'deleteConfirmModal';
  confirmModal.className = 'fixed inset-0 bg-black bg-opacity-80 z-50 flex items-center justify-center p-4';
  confirmModal.innerHTML = `
    <div class="glass rounded-2xl p-8 max-w-sm w-full text-center slide-up">
      <i data-lucide="trash-2" class="w-12 h-12 mx-auto mb-4 text-red-500"></i>
      <h2 class="font-bebas text-2xl mb-4 tracking-wider">DELETE POSTER</h2>
      <p class="text-gray-400 mb-6">Are you sure you want to delete this poster? This action cannot be undone.</p>
      <div class="flex gap-4">
        <button onclick="document.getElementById('deleteConfirmModal').remove()" class="flex-1 py-3 rounded-xl font-bebas text-lg bg-gray-700 hover:bg-gray-600 transition">CANCEL</button>
        <button onclick="confirmDeletePoster('${backendId}')" class="flex-1 py-3 rounded-xl font-bebas text-lg bg-red-600 hover:bg-red-700 text-white transition">DELETE</button>
      </div>
    </div>
  `;
  document.body.appendChild(confirmModal);
  lucide.createIcons();
}

async function confirmDeletePoster(backendId) {
  const result = await supabaseCall('products', 'DELETE', { id: backendId });
  document.getElementById('deleteConfirmModal')?.remove();
  if (result.ok) {
    await loadProductsFromSupabase();
    const categoryToShow = currentCategory || 'cars';
    renderAdmin(); // إعادة عرض الإدمن كاملة لتحديث البيانات
    setTimeout(() => {
      showPosterCategory(categoryToShow);
    }, 100);
  }
}

function showPosterCategory(catId) {
  const tabs = document.querySelectorAll('#posterTabs button');
  const pc = (window.elementSdk ? window.elementSdk.config.primary_color : null) || defaultConfig.primary_color;
  
  tabs.forEach(tab => {
    const isActive = tab.id === `tab-${catId}`;
    tab.style.background = isActive ? pc : '#1a1a1a';
    tab.style.color = isActive ? '#fff' : '#888';
  });

  const container = document.getElementById('postersContainer');
  const filtered = PRODUCTS.filter(p => p.category === catId);
  
  container.innerHTML = filtered.length === 0 
    ? `<div class="col-span-full text-center text-gray-500 py-8">No posters in this category yet</div>`
    : filtered.map(p => {
        const imageUrl = p.image || '';
        const gradient = p.gradient || 'from-gray-900 to-black';
        return `
          <div class="glass rounded-2xl overflow-hidden group">
            ${imageUrl ? `<img src="${imageUrl}" alt="${p.title}" class="w-full h-48 object-cover group-hover:scale-105 transition-transform" loading="lazy" onerror="console.error('Image failed:', this.src); this.style.display='none'; this.nextElementSibling?.style.display='block';">` : ''}
            <div class="w-full h-48 ${imageUrl ? 'hidden' : ''} bg-gradient-to-br ${gradient} flex items-center justify-center text-5xl">
              ${p.emoji || '🎨'}
            </div>
            <div class="p-4">
              <h3 class="font-bebas text-lg tracking-wider truncate">${p.title}</h3>
              <p class="text-red-400 font-bold text-lg mb-3">${p.price} EGP</p>
              <div class="flex gap-2">
                <button onclick="editPoster('${p.id}')" class="flex-1 px-3 py-2 rounded-lg bg-blue-600 hover:bg-blue-700 text-white text-sm flex items-center justify-center gap-1 transition font-bold" style="min-height: 36px; box-shadow: 0 0 8px rgba(59, 130, 246, 0.3); border: 1px solid rgba(59, 130, 246, 0.2);">
                  <i data-lucide="edit" class="w-4 h-4"></i> EDIT
                </button>
                <button onclick="deletePoster('${p.id}')" class="flex-1 px-3 py-2 rounded-lg bg-red-600 hover:bg-red-700 text-white text-sm flex items-center justify-center gap-1 transition font-bold" style="min-height: 36px; box-shadow: 0 0 8px rgba(220, 38, 38, 0.3); border: 1px solid rgba(220, 38, 38, 0.2);">
                  <i data-lucide="trash-2" class="w-4 h-4"></i> DELETE
                </button>
              </div>
            </div>
          </div>
        `;
      }).join('');
}

async function updateOrderStatus(backendId, newStatus) {
  const result = await supabaseCall('orders', 'PATCH', { id: backendId, status: newStatus });
  if (result.ok) {
    loadOrdersFromSupabase();
  } else {
    console.error('Failed to update order status');
  }
}

// ========== LOAD DATA FROM SUPABASE ==========
async function loadProductsFromSupabase() {
  const result = await supabaseCall('products', 'GET');
  if (result.ok) {
    PRODUCTS = result.data.map(o => ({
      slug: o.slug,
      title: o.title,
      category: o.category,
      price: o.price,
      emoji: o.emoji || '🎨',
      desc: o.desc || '',
      image: o.image || '',
      gradient: o.gradient || 'from-gray-900 to-black',
      id: o.id
    }));
  }
}

async function loadOrdersFromSupabase() {
  const result = await supabaseCall('orders', 'GET');
  if (result.ok) {
    orders = result.data;
  }
}

// ========== ANIMATIONS ==========
function startColorGlowAnimation() {
  const catNames = document.querySelectorAll('.cat-name');
  catNames.forEach(element => {
    let colorIndex = 0;
    const colors = ['#ffffff', '#ff1a1a'];
    const shadowLevels = [
      'none',
      '0 0 10px #ff1a1a, 0 0 20px #ff1a1a88, 0 0 30px #ff1a1a44'
    ];
    
    setInterval(() => {
      colorIndex = (colorIndex + 1) % 2;
      element.style.color = colors[colorIndex];
      element.style.textShadow = shadowLevels[colorIndex];
    }, 1000); // Change every 1 second for 2 second total cycle
  });
}

function startCardZoomAnimation() {
  const cards = document.querySelectorAll('.category-card');
  cards.forEach(card => {
    let isZoomed = false;
    card.addEventListener('mouseenter', () => {
      if (!isZoomed) {
        isZoomed = true;
        card.style.transform = 'scale(1.05)';
        card.style.transition = 'transform 0.3s ease-in-out';
      }
    });
    card.addEventListener('mouseleave', () => {
      isZoomed = false;
      card.style.transform = 'scale(1)';
    });
  });
}

// ========== ELEMENT SDK ==========
async function initApp() {
  try {
    // Load initial data from Supabase
    await loadProductsFromSupabase();
    await loadOrdersFromSupabase();

    // Init Element SDK if available (it might not be loaded)
    if (typeof window.elementSdk !== 'undefined' && window.elementSdk) {
      try {
        window.elementSdk.init({
          defaultConfig,
          onConfigChange: async (config) => {
            const pc = config.primary_color || defaultConfig.primary_color;
            const tc = config.text_color || defaultConfig.text_color;
            const bg = config.background_color || defaultConfig.background_color;
            const sc = config.secondary_color || defaultConfig.secondary_color;
            const ff = config.font_family || defaultConfig.font_family;
            const fs = config.font_size || defaultConfig.font_size;

            document.body.style.background = bg;
            document.body.style.color = tc;
            document.body.style.fontFamily = `'${ff}', 'Space Mono', monospace`;
            document.body.style.fontSize = fs + 'px';

            const navT = document.getElementById('navTitle');
            if (navT) navT.style.fontFamily = `'${ff}', 'Bebas Neue', cursive`;

            // Handle logo - can be emoji or URL
            const logoEl = document.getElementById('navLogoEl');
            if (logoEl) {
              const logoValue = config.site_logo || defaultConfig.site_logo;
              if (logoValue.startsWith('http')) {
                logoEl.textContent = '';
                logoEl.style.backgroundImage = `url(${logoValue})`;
                logoEl.style.display = 'inline-block';
              } else {
                logoEl.textContent = logoValue;
                logoEl.style.backgroundImage = 'none';
              }
            }

            const heroT = document.getElementById('heroTitleEl');
            if (heroT) {
              heroT.textContent = config.hero_title || defaultConfig.hero_title;
              heroT.style.textShadow = `0 0 60px ${pc}44`;
              heroT.style.fontFamily = `'Caveat', cursive`;
              heroT.style.fontSize = `${fs * 5}px`;
              heroT.style.background = `linear-gradient(90deg, ${pc}, #ff6b6b, ${pc})`;
              heroT.style.webkitBackgroundClip = `text`;
              heroT.style.webkitTextFillColor = `transparent`;
              heroT.style.backgroundClip = `text`;
            }
            const heroS = document.getElementById('heroSubEl');
            if (heroS) {
              heroS.textContent = config.hero_subtitle || defaultConfig.hero_subtitle;
              heroS.style.color = sc;
            }
          },
          mapToCapabilities: (config) => ({
            recolorables: [
              { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; if (window.elementSdk) window.elementSdk.setConfig({ background_color: v }); }},
              { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; if (window.elementSdk) window.elementSdk.setConfig({ surface_color: v }); }},
              { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; if (window.elementSdk) window.elementSdk.setConfig({ text_color: v }); }},
              { get: () => config.primary_color || defaultConfig.primary_color, set: (v) => { config.primary_color = v; if (window.elementSdk) window.elementSdk.setConfig({ primary_color: v }); }},
              { get: () => config.secondary_color || defaultConfig.secondary_color, set: (v) => { config.secondary_color = v; if (window.elementSdk) window.elementSdk.setConfig({ secondary_color: v }); }},
            ],
            borderables: [],
            fontEditable: {
              get: () => config.font_family || defaultConfig.font_family,
              set: (v) => { config.font_family = v; if (window.elementSdk) window.elementSdk.setConfig({ font_family: v }); }
            },
            fontSizeable: {
              get: () => config.font_size || defaultConfig.font_size,
              set: (v) => { config.font_size = v; if (window.elementSdk) window.elementSdk.setConfig({ font_size: v }); }
            }
          }),
          mapToEditPanelValues: (config) => new Map([
            ['site_logo', config.site_logo || defaultConfig.site_logo],
            ['hero_title', config.hero_title || defaultConfig.hero_title],
            ['hero_subtitle', config.hero_subtitle || defaultConfig.hero_subtitle],
            ['cat_cars_image', config.cat_cars_image || defaultConfig.cat_cars_image],
            ['cat_football_image', config.cat_football_image || defaultConfig.cat_football_image],
            ['cat_cinema_image', config.cat_cinema_image || defaultConfig.cat_cinema_image],
            ['cat_anime_image', config.cat_anime_image || defaultConfig.cat_anime_image],
            ['cat_gaming_image', config.cat_gaming_image || defaultConfig.cat_gaming_image],
            ['cat_minimalist_image', config.cat_minimalist_image || defaultConfig.cat_minimalist_image],
          ])
        });
      } catch (e) {
        console.warn('Element SDK init failed:', e);
      }
    }

    // Load category covers from localStorage
    loadCategoryCovers();
    
    // Start animations
    setTimeout(() => {
      startColorGlowAnimation();
      startCardZoomAnimation();
    }, 500);
    
    navigateTo('home');
  } catch (err) {
    console.error('Initialization error:', err);
    navigateTo('home');
  }
}

initApp();
</script>
